version: '3.8'

services:
  mariadb:
    image: mariadb:11.2
    container_name: community_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: community_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init-database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 20s
      retries: 10
      start_period: 40s
    networks:
      - community_network

  spring-boot-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: community_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/community_db?characterEncoding=UTF-8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_password_123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - community_network

  vue3-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: community_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - spring-boot-app
    networks:
      - community_network

volumes:
  mariadb_data:
    driver: local

networks:
  community_network:
    driver: bridge